<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <section>

    <div>

    <div id="picture">
        <picture>
            <source srcset="img/odaiba.webp" media="(min-width: 900px)">
            <source srcset="img/odaiba-resize.webp" media="(min-width: 300px)">

        </picture>

    <div>
        <img src="img/odaiba.jpg" alt="" class="object-fit">

    <div class="media-mobile">

    </div>

    <div class="media-desktop">
        <p>500px以下の時にスタイルが変更される</p>
    </div>

    <div>
        <a href="#picture" class="text-link">テキストリンク</a>

        <a href="#" class="button-link2">ボタンリンク2</a>

    <h2>こんなお悩みありませんか？</h2>
    <!-- Unordered List -->
    <ul>
        <li>肩こりや頭痛がひどい</li>
        <li>手足が氷のように冷える</li>
        <li>寝ても疲れがとれない</li>
    </ul>


    <h2>ご旅行の申込みから出発まで</h2>
    <!-- Ordered List -->
    <ol>
        <li>Webで申し込み</li>
        <li>期限までにお支払い</li>

        <li>ご出発</li>
    </ol>

</body>

</html>
