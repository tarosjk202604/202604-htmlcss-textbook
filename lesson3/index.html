<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <section>
        <h1>Web限定キャンペーン中！</h1>
        <p>Webでお申し込みいただいた方限定で、<em>特別価格</em>を実施中です。</p>
    </section>

    <div>
        <img src="img/odaiba.jpg" alt="お台場の夜景" class="maxwidth">
    </div>

    <div id="picture">
        <picture>
            <source srcset="img/odaiba.webp" media="(min-width: 900px)">
            <source srcset="img/odaiba-resize.webp" media="(min-width: 300px)">
            <img src="img/odaiba.jpg" alt="お台場からレインボーブリッジを望む">
        </picture>
    </div>

    <div>
        <img src="img/odaiba.jpg" alt="" class="object-fit">
    </div>

    <div class="media-mobile">
        <p>960px以上の時にスタイルが変更される</p>
    </div>

    <div class="media-desktop">
        <p>500px以下の時にスタイルが変更される</p>
    </div>

    <div>
        <a href="#picture" class="text-link">テキストリンク</a>
        <a href="https://books.mdn.co.jp" class="button-link" target="_blank">ボタンリンク</a>
        <a href="#" class="button-link2">ボタンリンク2</a>
    </div>

</body>

</html>
