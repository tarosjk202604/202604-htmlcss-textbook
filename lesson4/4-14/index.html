    <h1>ホバーアニメーション</h1>
    <p>下の3つの要素にホバーしてみよう！</p>
    <div class="width">右に伸びる</div>
    <div class="circle">四角から丸に</div>
    <div class="scale">ホバーして1秒後にズームアップ</div>


    <h1>キーフレームアニメーション</h1>
    <p>開始1秒で右下へ、次の1秒で右上へ。を3回繰り返す</p>
    <div class="sample1">ジグザグに動く</div>

    <p>開始2秒で拡大しながら赤→青へ、次の2秒で縮小しながら青→緑へ。そのあとは逆再生</p>
    <div class="sample2">イージングも逆再生される</div>

    <p>ローディングアニメーション</p>
    <img src="img/loading.png" alt="" class="sample3">
    <img src="img/heart.svg" alt="" class="sample4">
